<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Admin Dashboard — Ahmed Malik</title>
<meta name="robots" content="noindex, nofollow" />
<link rel="stylesheet" href="css/admin.css" />
</head>
<body>
  <div class="admin-topbar">
    <h1>Portfolio Admin Dashboard</h1>
    <button class="admin-row-btn" onclick="logoutAdmin()">Log out</button>
  </div>

  <main class="admin-main">
    <div class="admin-tabs">
      <button class="admin-tab is-active" data-tab="all">All</button>
      <button class="admin-tab" data-tab="contact">Contact Form</button>
      <button class="admin-tab" data-tab="meeting">Meeting Requests</button>
    </div>

    <div class="admin-table-wrap">
      <table class="admin-table" id="submissions-table">
        <thead>
          <tr>
            <th>Date</th>
            <th>Type</th>
            <th>Name</th>
            <th>Email</th>
            <th>Details</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="submissions-body">
          <tr><td colspan="7" class="admin-empty">Loading…</td></tr>
        </tbody>
      </table>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/dashboard.js"></script>
</body>
</html>
