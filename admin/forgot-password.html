<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Reset Password — Admin</title>
<meta name="robots" content="noindex, nofollow" />
<link rel="stylesheet" href="css/admin.css" />
</head>
<body>
  <div class="admin-center">
    <form class="admin-card" id="forgot-form">
      <h1>Reset Password</h1>
      <p style="color:var(--admin-muted); font-size:0.85rem; margin-top:-1rem; margin-bottom:1.25rem;">
        Enter your admin email and we'll send a password reset link.
      </p>
      <div class="admin-field">
        <label for="email">Email</label>
        <input type="email" id="email" required autocomplete="username" />
      </div>
      <button type="submit" class="admin-btn" id="reset-btn">Send Reset Link</button>
      <p class="admin-status" id="reset-status"></p>
      <p style="text-align:center; margin-top:1rem;">
        <a href="login.html" class="admin-link">Back to login</a>
      </p>
    </form>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/supabase-client.js"></script>
  <script>
    document.getElementById('forgot-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('reset-btn');
      const status = document.getElementById('reset-status');
      const email = document.getElementById('email').value.trim();

      btn.disabled = true;

      const { error } = await window.adminSupabase.auth.resetPasswordForEmail(email, {
        redirectTo: `${window.location.origin}${window.location.pathname.replace('forgot-password.html', 'reset-password.html')}`,
      });

      if (error) {
        status.textContent = error.message;
        status.className = 'admin-status error';
      } else {
        status.textContent = 'If that email is registered, a reset link has been sent.';
        status.className = 'admin-status ok';
      }
      btn.disabled = false;
    });
  </script>
</body>
</html>
