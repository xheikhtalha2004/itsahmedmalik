<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Admin Login — Ahmed Malik</title>
<meta name="robots" content="noindex, nofollow" />
<link rel="stylesheet" href="css/admin.css" />
</head>
<body>
  <div class="admin-center">
    <form class="admin-card" id="login-form">
      <h1>Admin Login</h1>
      <div class="admin-field">
        <label for="email">Email</label>
        <input type="email" id="email" required autocomplete="username" />
      </div>
      <div class="admin-field">
        <label for="password">Password</label>
        <input type="password" id="password" required autocomplete="current-password" />
      </div>
      <button type="submit" class="admin-btn" id="login-btn">Sign In</button>
      <p class="admin-status" id="login-status"></p>
      <p style="text-align:center; margin-top:1rem;">
        <a href="forgot-password.html" class="admin-link">Forgot password?</a>
      </p>
    </form>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/auth.js"></script>
  <script>
    redirectIfAuthed();

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('login-btn');
      const status = document.getElementById('login-status');
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      btn.disabled = true;
      status.textContent = '';
      status.className = 'admin-status';

      const { error } = await window.adminSupabase.auth.signInWithPassword({ email, password });

      if (error) {
        status.textContent = error.message;
        status.className = 'admin-status error';
        btn.disabled = false;
        return;
      }

      window.location.href = 'dashboard.html';
    });
  </script>
</body>
</html>
