<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Set New Password — Admin</title>
<meta name="robots" content="noindex, nofollow" />
<link rel="stylesheet" href="css/admin.css" />
</head>
<body>
  <div class="admin-center">
    <form class="admin-card" id="new-pass-form">
      <h1>Set New Password</h1>
      <div class="admin-field">
        <label for="password">New Password</label>
        <input type="password" id="password" required minlength="8" autocomplete="new-password" />
      </div>
      <button type="submit" class="admin-btn" id="save-btn">Update Password</button>
      <p class="admin-status" id="save-status"></p>
    </form>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/supabase-client.js"></script>
  <script>
    // Supabase places a recovery token in the URL hash; the JS client
    // automatically exchanges it for a session when the SDK loads.
    document.getElementById('new-pass-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('save-btn');
      const status = document.getElementById('save-status');
      const password = document.getElementById('password').value;

      btn.disabled = true;
      const { error } = await window.adminSupabase.auth.updateUser({ password });

      if (error) {
        status.textContent = error.message;
        status.className = 'admin-status error';
        btn.disabled = false;
        return;
      }

      status.textContent = 'Password updated! Redirecting to login…';
      status.className = 'admin-status ok';
      setTimeout(() => (window.location.href = 'login.html'), 1500);
    });
  </script>
</body>
</html>
